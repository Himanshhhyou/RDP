name: Tailscale Runner

on:
  workflow_dispatch:

jobs:
  connect:
    runs-on: ubuntu-latest

    steps:
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: |
          sudo tailscale up --authkey ${{ secrets.TS_AUTH_KEY }}

      - name: Show Tailscale IP
        run: |
          tailscale ip -4
